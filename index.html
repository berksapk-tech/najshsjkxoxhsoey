<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Network | Enterprise Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #a020f0; --bg: #050505; --card: #121212; --acc: #00ffcc; --red: #ff4444; --gold: #ffd700; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* Nav & Badges */
        .nav { display: flex; justify-content: space-between; padding: 15px 20px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 2px solid var(--p); align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; color: var(--p); font-size: 1.1rem; text-shadow: 0 0 10px var(--p); letter-spacing: 1px; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .balance-badge { background: linear-gradient(45deg, var(--p), #4b0082); padding: 6px 12px; border-radius: 10px; font-family: 'Orbitron'; font-size: 0.7rem; border: 1px solid rgba(255,255,255,0.2); }
        .logout-btn { background: var(--red); color: white; border: none; padding: 6px 10px; border-radius: 8px; font-size: 0.65rem; font-family: 'Orbitron'; cursor: pointer; }

        /* Tabs */
        .tabs { display: flex; justify-content: center; gap: 6px; padding: 15px; flex-wrap: wrap; }
        .tab-btn { background: #111; color: #888; border: 1px solid #333; padding: 8px 10px; border-radius: 8px; font-family: 'Orbitron'; cursor: pointer; font-size: 0.6rem; transition: 0.3s; }
        .tab-btn.active { background: var(--p); color: #fff; box-shadow: 0 0 12px var(--p); border-color: var(--p); }

        .section { display: none; max-width: 1000px; margin: auto; padding: 15px; animation: slideUp 0.4s ease; }
        .section.active { display: block; }

        /* Tables & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .card { background: var(--card); border: 1px solid #222; padding: 15px; border-radius: 15px; text-align: center; }
        .table-res { width: 100%; border-collapse: collapse; font-size: 0.7rem; background: #0a0a0a; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .table-res th, .table-res td { padding: 10px; text-align: left; border-bottom: 1px solid #1a1a1a; }
        .table-res th { background: #111; color: var(--p); font-family: 'Orbitron'; }

        /* Auth */
        input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .primary-btn { width: 100%; padding: 12px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; }
        
        .admin-only { display: none; border-left: 4px solid var(--p); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="auth-page" style="text-align:center; margin-top:80px; padding:20px;">
    <h1 class="logo" style="font-size:2.5rem; margin-bottom: 20px;">NEBULA NETWORK</h1>
    <div style="max-width:320px; margin:auto; background:#111; padding:25px; border-radius:20px; border:1px solid #222;">
        <h3 id="auth-title" style="font-family:'Orbitron'; margin-bottom:20px;">GİRİŞ YAP</h3>
        <input type="email" id="email" placeholder="E-posta">
        <input type="password" id="password" placeholder="Şifre">
        <button id="auth-btn" onclick="handleAuth()" class="primary-btn">BAĞLAN</button>
        <p style="font-size:0.8rem; color:#888; margin-top:15px; cursor:pointer;" onclick="toggleAuthMode()" id="auth-switch">
            Hesabın yok mu? <span style="color:var(--p); font-weight:bold;">Kayıt Ol</span>
        </p>
    </div>
</div>

<div id="main-page" style="display:none;">
    <div class="nav">
        <div class="logo">NEBULA NETWORK</div>
        <div class="nav-right">
            <div class="balance-badge" id="nb-balance">0 NB</div>
            <button class="logout-btn" onclick="logoutAction()">ÇIKIŞ</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(this, 'market')">MARKET</button>
        <button class="tab-btn" onclick="switchTab(this, 'mine')">KAZAN</button>
        <button class="tab-btn" onclick="switchTab(this, 'orders'); loadMyOrders();">SİPARİŞLERİM</button>
        <button class="tab-btn" onclick="switchTab(this, 'license')">LİSANS</button>
        <button id="admin-tab-btn" class="tab-btn admin-only" onclick="switchTab(this, 'admin'); loadAdminLogs();">YÖNETİM</button>
    </div>

    <div id="market" class="section active"><div class="grid" id="market-grid"></div></div>

    <div id="mine" class="section" style="text-align:center;">
        <button onclick="earnNB()" style="width:160px; height:160px; border-radius:50%; background:radial-gradient(circle, var(--p), #200040); border:6px solid #1a1a1a; color:white; font-family:Orbitron; box-shadow: 0 0 25px var(--p); cursor:pointer;">NB KAZAN</button>
    </div>

    <div id="orders" class="section">
        <h3 style="font-family:Orbitron; border-left:4px solid var(--acc); padding-left:10px;">Siparişlerim</h3>
        <table class="table-res">
            <thead><tr><th>Eşya</th><th>Kod</th><th>Durum</th></tr></thead>
            <tbody id="my-orders-list"></tbody>
        </table>
    </div>

    <div id="license" class="section">
        <div style="border:1px solid var(--gold); padding:25px; border-radius:15px; background:#111;">
            <h3 style="font-family:Orbitron; color:var(--gold); margin:0;">SERVER BY BERKSASHARE</h3>
            <p style="font-size:0.8rem; color:#aaa;">Singapore Central HQ | 20 Year Active License (2026-2046)</p>
        </div>
    </div>

    <div id="admin" class="section admin-only">
        <div style="background:#0f0f0f; padding:20px; border-radius:15px; border:1px solid #333; margin-bottom:20px;">
            <h4 style="font-family:Orbitron; margin:0 0 10px 0;">Kod Onay</h4>
            <input type="text" id="verifyInput" placeholder="NB-XXXX Kodunu Gir">
            <button onclick="verifyCode()" class="primary-btn" style="background:var(--acc); color:#000;">KODU ONAYLA</button>
        </div>
        <table class="table-res">
            <thead><tr><th>Kullanıcı</th><th>Ürün</th><th>Kod</th><th>Durum</th></tr></thead>
            <tbody id="admin-all-logs"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const fbConfig = { apiKey: "AIzaSyAFI3c4_-cmrdA_hV7WE1-Ri-DMP4IgaNQ", authDomain: "nebulanetwork.firebaseapp.com", projectId: "nebulanetwork", appId: "1:791733113853:web:3fc2050f7f54bdddd0ff94" };
    const app = initializeApp(fbConfig);
    const auth = getAuth(app);

    const S_URL = 'https://isrurpwexhfwtudjakss.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzcnVycHdleGhmd3R1ZGpha3NzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2ODEwMDgsImV4cCI6MjA4OTI1NzAwOH0.cs66EcblDR7Ovs9m54qQjAEfrs6laQ6qwiyx0_DA9mE';
    const supabase = window.supabase.createClient(S_URL, S_KEY);

    let currentEmail = "";
    let isLoginMode = true;
    const ADMIN_MAIL = 'habosnebus070@nebulanetwork.com';

    window.toggleAuthMode = () => {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "GİRİŞ YAP" : "KAYIT OL";
        document.getElementById('auth-btn').innerText = isLoginMode ? "BAĞLAN" : "HESAP OLUŞTUR";
    };

    window.handleAuth = () => {
        const e = document.getElementById('email').value, p = document.getElementById('password').value;
        if(isLoginMode) signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        else createUserWithEmailAndPassword(auth, e, p).then(async () => {
            await supabase.from('profiles').insert([{ email: e.toLowerCase(), balance: 0 }]);
        }).catch(err => alert(err.message));
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentEmail = user.email.toLowerCase();
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-page').style.display = 'block';
            
            // KRİTİK KONTROL: Sadece Admin ise butonları ve sekmeyi göster
            if(currentEmail === ADMIN_MAIL) {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            } else {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
            }

            sync(); loadMarket();
        } else {
            document.getElementById('auth-page').style.display = 'block';
            document.getElementById('main-page').style.display = 'none';
        }
    });

    window.logoutAction = () => signOut(auth).then(() => location.reload());

    async function sync() {
        const { data } = await supabase.from('profiles').select('balance').eq('email', currentEmail).maybeSingle();
        document.getElementById('nb-balance').innerText = (data ? data.balance : 0) + " NB";
    }

    window.earnNB = async () => {
        const { data } = await supabase.from('profiles').select('balance').eq('email', currentEmail).single();
        let nb = (data ? data.balance : 0) + 1;
        await supabase.from('profiles').upsert({ email: currentEmail, balance: nb }, { onConflict: 'email' });
        document.getElementById('nb-balance').innerText = nb + " NB";
    };

    window.buyItem = async (name, price) => {
        const { data } = await supabase.from('profiles').select('balance').eq('email', currentEmail).single();
        if(data.balance < price) return alert("Yetersiz NB!");
        const code = "NB-" + Math.random().toString(36).substring(2, 7).toUpperCase();
        await supabase.from('profiles').update({ balance: data.balance - price }).eq('email', currentEmail);
        await supabase.from('purchase_codes').insert([{ email: currentEmail, item_name: name, code: code, is_used: false }]);
        alert("Satın Alındı! Kodun: " + code);
        sync();
    };

    window.loadMyOrders = async () => {
        const { data } = await supabase.from('purchase_codes').select('*').eq('email', currentEmail).order('created_at', { ascending: false });
        document.getElementById('my-orders-list').innerHTML = data ? data.map(l => `
            <tr><td>${l.item_name}</td><td style="color:var(--acc); font-weight:bold;">${l.code}</td><td><span style="color:${l.is_used ? 'var(--red)' : 'var(--acc)'}">${l.is_used ? 'Kullanıldı' : 'Aktif'}</span></td></tr>
        `).join('') : '';
    };

    window.loadAdminLogs = async () => {
        if(currentEmail !== ADMIN_MAIL) return; // Ek güvenlik
        const { data } = await supabase.from('purchase_codes').select('*').order('created_at', { ascending: false });
        document.getElementById('admin-all-logs').innerHTML = data ? data.map(l => `
            <tr style="${l.is_used ? 'opacity:0.4' : ''}"><td>${l.email.split('@')[0]}</td><td>${l.item_name}</td><td style="color:var(--acc); font-weight:bold;">${l.code}</td><td>${l.is_used ? 'KULLANILDI' : 'AKTİF'}</td></tr>
        `).join('') : '';
    };

    window.verifyCode = async () => {
        if(currentEmail !== ADMIN_MAIL) return;
        const c = document.getElementById('verifyInput').value.trim().toUpperCase();
        const { data } = await supabase.from('purchase_codes').select('*').eq('code', c).maybeSingle();
        if(!data) alert("Kod geçersiz!");
        else if(data.is_used) alert("Kod zaten kullanılmış!");
        else {
            await supabase.from('purchase_codes').update({ is_used: true }).eq('code', c);
            alert("Onaylandı!"); loadAdminLogs();
        }
    };

    window.switchTab = (btn, id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    };

    async function loadMarket() {
        const { data } = await supabase.from('items').select('*');
        document.getElementById('market-grid').innerHTML = data ? data.map(i => `
            <div class="card">
                <img src="${i.image_url}" width="35" onerror="this.src='https://minecraft.wiki/images/Grass_Block_JE7_BE6.png'">
                <div style="font-size:10px; margin:5px 0;">${i.name}</div>
                <div style="color:var(--acc); font-size:10px;">${i.price} NB</div>
                <button onclick="buyItem('${i.name}', ${i.price})" style="background:var(--p); border:none; color:white; font-size:9px; width:100%; border-radius:5px; padding:4px; cursor:pointer;">AL</button>
            </div>
        `).join('') : '';
    }
</script>
</body>
</html>
